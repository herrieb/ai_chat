services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9231:9231"
    environment:
      HOST: 0.0.0.0
      PORT: 9231
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
